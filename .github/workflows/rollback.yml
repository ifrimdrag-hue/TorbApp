name: Rollback Production to Previous Version

# Triggered manually from GitHub UI:
# Actions → "Rollback Production to Previous Version" → Run workflow
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type ROLLBACK to confirm. This reverts production to the previous commit.'
        required: true

jobs:
  rollback:
    name: Rollback production
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "ROLLBACK" ]; then
            echo "Confirmation not received — expected 'ROLLBACK', got '${{ github.event.inputs.confirm }}'"
            echo "Aborting. No changes were made to production."
            exit 1
          fi
          echo "Confirmation received. Proceeding with rollback."

      - name: Execute rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2112
          script: |
            set -e
            git config --global --add safe.directory /var/www/html/torb-py
            cd /var/www/html/torb-py

            if [ ! -f .previous_deploy_sha ]; then
              echo "ERROR: .previous_deploy_sha not found."
              echo "This file is written by the deploy workflow on every deploy."
              echo "It will exist after the next successful deployment."
              exit 1
            fi

            PREVIOUS_SHA=$(cat .previous_deploy_sha)
            CURRENT_FULL=$(git log -1 --format="%h %s (%ci)" HEAD)
            PREVIOUS_FULL=$(git log -1 --format="%h %s (%ci)" "$PREVIOUS_SHA")

            echo "Current version:  $CURRENT_FULL"
            echo "Rolling back to:  $PREVIOUS_FULL"

            git reset --hard "$PREVIOUS_SHA"

            source venv/bin/activate

            # Migrations are additive — safe to re-run after rollback
            python migrations/runner.py data/torb.db

            sudo systemctl restart torb-py

            echo "Rollback complete. Production is now on: $(git rev-parse --short HEAD)"

      - name: Wait for service to come up
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://app.robrands.ro/healthz" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Service is up after ~$((i*5))s"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Service did not come up after rollback."
          echo "Contact the technical team immediately — manual intervention required."
          exit 1

      - name: Smoke test after rollback
        run: |
          BASE="https://app.robrands.ro"
          FAILED=0
          for path in / /forecast /bonus /actualizare /preturi /conditii /clients /team /products; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 3 --retry-delay 5 "$BASE$path")
            echo "$STATUS  $path"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
              echo "FAIL: $path returned $STATUS"
              FAILED=1
            fi
          done
          [ "$FAILED" = "0" ] || exit 1
