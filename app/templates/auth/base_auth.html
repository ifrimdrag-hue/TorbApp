<!doctype html>
<html lang="ro" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Torb Logistic{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
<div class="container py-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="row justify-content-center mb-2">
      <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="alert alert-{{ cat }} py-2 mb-0">{{ msg }}</div>
      </div>
    </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
